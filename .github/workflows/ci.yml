name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit

      - name: Typecheck
        run: bun run typecheck

      - name: Build and verify committed output
        run: bun run check:dist

      - name: Test
        run: bun run test
